<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" stroke="none">
  <!-- Background -->
  <rect width="512" height="512" fill="#FFE4EC"/>

  <!-- Star burst sparkles (thin cross shapes) -->
  <g fill="#FFD54F">
    <!-- Above heart -->
    <rect x="218" y="42" width="1.5" height="12" rx="0.75"/>
    <rect x="212.5" y="47" width="12.5" height="1.5" rx="0.75"/>
    <rect x="295" y="55" width="1" height="10" rx="0.5"/>
    <rect x="290.5" y="59" width="10" height="1" rx="0.5"/>
    <!-- Top corners -->
    <rect x="108" y="85" width="2" height="16" rx="1"/>
    <rect x="101" y="92" width="16" height="2" rx="1"/>
    <rect x="405" y="78" width="1.5" height="12" rx="0.75"/>
    <rect x="399.5" y="83" width="12.5" height="1.5" rx="0.75"/>
    <!-- Left side -->
    <rect x="38" y="205" width="1.5" height="12" rx="0.75"/>
    <rect x="32.5" y="210" width="12.5" height="1.5" rx="0.75"/>
    <rect x="52" y="340" width="1" height="10" rx="0.5"/>
    <rect x="47.5" y="344" width="10" height="1" rx="0.5"/>
    <!-- Right side -->
    <rect x="468" y="230" width="1" height="10" rx="0.5"/>
    <rect x="463.5" y="234" width="10" height="1" rx="0.5"/>
    <rect x="452" y="320" width="1.5" height="12" rx="0.75"/>
    <rect x="446.5" y="325" width="12.5" height="1.5" rx="0.75"/>
    <!-- Bottom area -->
    <rect x="120" y="410" width="2" height="14" rx="1"/>
    <rect x="114" y="416" width="14" height="2" rx="1"/>
    <rect x="395" y="400" width="1.5" height="10" rx="0.75"/>
    <rect x="390.5" y="404" width="10.5" height="1.5" rx="0.75"/>
    <rect x="255" y="455" width="1" height="8" rx="0.5"/>
    <rect x="251.5" y="458" width="8" height="1" rx="0.5"/>
    <!-- Scattered small -->
    <rect x="165" y="155" width="1" height="8" rx="0.5"/>
    <rect x="161.5" y="158" width="8" height="1" rx="0.5"/>
    <rect x="470" y="155" width="1" height="8" rx="0.5"/>
    <rect x="466.5" y="158" width="8" height="1" rx="0.5"/>
    <rect x="80" y="440" width="1" height="8" rx="0.5"/>
    <rect x="76.5" y="443" width="8" height="1" rx="0.5"/>
    <rect x="435" cy="440" y="438" width="1" height="8" rx="0.5"/>
    <rect x="431.5" y="441" width="8" height="1" rx="0.5"/>
  </g>

  <!-- Balance scale base -->
  <rect x="240" y="276" width="32" height="108" rx="8" fill="#5D4037"/>
  <rect x="186" y="366" width="140" height="28" rx="14" fill="#5D4037"/>

  <!-- Balance beam -->
  <rect x="104" y="190" width="304" height="20" rx="10" fill="#5D4037"/>

  <!-- Pivot point -->
  <circle cx="256" cy="200" r="22" fill="#5D4037"/>
  <circle cx="256" cy="200" r="12" fill="#FFE4EC"/>

  <!-- Left chain -->
  <rect x="112" y="200" width="12" height="50" fill="#8D6E63"/>

  <!-- Left pan (Kiki - pink) -->
  <path d="M 50 250 Q 50 292 118 292 Q 186 292 186 250 Z" fill="#FF6B9D"/>
  <text x="118" y="280" text-anchor="middle" fill="white" font-size="24" font-weight="900" font-family="Verdana, Geneva, sans-serif">K</text>

  <!-- Right chain -->
  <rect x="388" y="200" width="12" height="50" fill="#8D6E63"/>

  <!-- Right pan (Wayne - teal) -->
  <path d="M 326 250 Q 326 292 394 292 Q 462 292 462 250 Z" fill="#4ECDC4"/>
  <text x="394" y="280" text-anchor="middle" fill="white" font-size="24" font-weight="900" font-family="Verdana, Geneva, sans-serif">W</text>

  <!-- Heart on top (smaller) -->
  <path d="M 256 115 C 245 92, 216 92, 216 115 C 216 140, 256 160, 256 160 C 256 160, 296 140, 296 115 C 296 92, 267 92, 256 115 Z" fill="#FFB0C4"/>
</svg>
