<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#F8F0FF"/>

  <!-- Left block - Kiki pink -->
  <rect x="56" y="140" width="180" height="232" rx="28" fill="#FF6B9D"/>
  <text x="146" y="285" text-anchor="middle" fill="white" font-size="96" font-weight="700" font-family="system-ui, Arial">K</text>

  <!-- Right block - Wayne teal -->
  <rect x="276" y="140" width="180" height="232" rx="28" fill="#4ECDC4"/>
  <text x="366" y="285" text-anchor="middle" fill="white" font-size="96" font-weight="700" font-family="system-ui, Arial">W</text>

