<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#FFE4EC"/>

  <!-- Balance scale base -->
  <rect x="246" y="280" width="20" height="100" rx="5" fill="#5D4037"/>
  <rect x="206" y="370" width="100" height="16" rx="8" fill="#5D4037"/>

  <!-- Balance beam -->
  <rect x="116" y="196" width="280" height="8" rx="4" fill="#5D4037"/>

  <!-- Pivot point -->
  <circle cx="256" cy="200" r="14" fill="#5D4037"/>
  <circle cx="256" cy="200" r="8" fill="#FFE4EC"/>

  <!-- Left chain -->
  <rect x="118" y="200" width="4" height="50" fill="#8D6E63"/>

  <!-- Left pan (Kiki - pink) -->
  <path d="M 70 250 Q 70 280 120 280 Q 170 280 170 250 Z" fill="#FF6B9D"/>
  <text x="120" y="272" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="Arial">K</text>

  <!-- Right chain -->
  <rect x="390" y="200" width="4" height="50" fill="#8D6E63"/>

  <!-- Right pan (Wayne - teal) -->
  <path d="M 342 250 Q 342 280 392 280 Q 442 280 442 250 Z" fill="#4ECDC4"/>
  <text x="392" y="272" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="Arial">W</text>

  <!-- Heart on top -->
  <path d="M 256 140 C 246 120, 220 120, 220 140 C 220 160, 256 180, 256 180 C 256 180, 292 160, 292 140 C 292 120, 266 120, 256 140 Z" fill="#FF6B9D" opacity="0.7"/>

  <!-- Sparkles -->
  <circle cx="160" cy="150" r="4" fill="#FFD54F"/>
  <circle cx="350" cy="160" r="3" fill="#FFD54F"/>
  <circle cx="180" cy="340" r="3" fill="#FFD54F"/>
  <circle cx="340" cy="330" r="4" fill="#FFD54F"/>
</svg>
